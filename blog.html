<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8" />

    <!-- SEO / Social -->
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" />

    <!-- ================= CSP ================= -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src
          'self'
          https://cdnjs.cloudflare.com
          https://unpkg.com;
        style-src
          'self'
          https://cdnjs.cloudflare.com
          https://unpkg.com;
        font-src
          'self'
          https://cdnjs.cloudflare.com
          https://fonts.gstatic.com;
        img-src
          'self'
          data:
          https:;
        object-src 'none';
      ">
    
    <!-- ================= PERFORMANCE ================= -->
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.20/dist/lenis.css">
    <link rel="prefetch" href="./json/peopleBio.json" as="fetch" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" as="style" />
    <link rel="preload" href="./Lyra_UI/css/project_editorial.css" as="style" />
    <link rel="preload" href="./styles.css" as="style" />
    
    <!-- ================= STYLES ================= -->
    <link rel="stylesheet" href="./Lyra_UI/css/project_editorial.css">
    <link rel="stylesheet" href="./Lyra_UI/css/sidebar.css">
    <link rel="stylesheet" href="./styles.css" />
    
    <!-- ================= SCRIPTS (ES MODULES) ================= -->
    <script type="module" defer nonce="random123" src="./Lyra_UI/js/header.js"></script>
    <script type="module" defer nonce="random123" src="./Lyra_UI/js/main.js"></script>
    <script type="module" nonce="random123" src="./Lyra_UI/js/footer.js"></script>
    <script type="module" nonce="random123" src="./indexScript.js"></script>
    <script type="module" defer nonce="random123" src="./script.js"></script>
    
    <script src="https://unpkg.com/lenis@1.3.20/dist/lenis.min.js"></script> 
    
    <title></title>
</head>
<body data-title="Blog For You">
    <header></header>
    <main>
        <section class="section">
            <script src="./article.js" nonce="random123" type="module"></script>
            <div class="carousel">
                <div class="carousel-track"></div>
                <div class="carousel-caption">
                    <span class="carousel-news-type"></span>
                    <h2 class="carousel-title"></h2>
                    <p class="carousel-subtitle"></p>
                </div>
                <div class="carousel-indicators"></div>

                <button class="btn carousel-btn prev-btn" aria-label="Previous slide">&#10094;</button>
                <button class="btn carousel-btn next-btn" aria-label="Next slide">&#10095;</button>
            </div>
            <main class="news-carousel">
            </main>
        </section>
        <section class="section desc">
            <div class="section-header">
                <h1 class="section-title small">Our latest blog</h1>
            </div>
            <div class="section-content">
                <div class="list">
                    <div class="list-content">
                        <div class="list-item bg">
                            <div class="list-item-header">
                                <h1>What's new in Lyra Beta 2?</h1>
                                <span class="addedTag">March 3, 2026</span>
                                <span class="addedTag">Nathania Anneta</span>
                            </div>
                            <div class="list-item-content">
                                <p>Lyra Beta 2 brings exciting updates and improvements to enhance your design experience. See what's new in this version!</p>
                            </div>
                            <a href="/articles/blob/example/example" class="md-link">See more</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        </main>
    <footer></footer>
</body>
</html>
